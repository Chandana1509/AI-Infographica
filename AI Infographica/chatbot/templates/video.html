<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Video Assistant - AI Chatbot</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 750px;
      width: 100%;
      overflow: hidden;
      animation: slideIn 0.5s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 1.8rem;
      font-weight: bold;
    }

    video {
      width: 100%;
      border-radius: 12px;
      background: #000;
    }

    #chatBox {
      background: #f8f9fa;
      height: 300px;
      overflow-y: auto;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .message {
      padding: 10px 15px;
      border-radius: 15px;
      margin-bottom: 12px;
      max-width: 85%;
      line-height: 1.5;
      word-wrap: break-word;
      animation: fadeIn 0.4s ease-out;
    }

    .user-message {
      background: #667eea;
      color: white;
      margin-left: auto;
    }

    .bot-message {
      background: white;
      border: 1px solid #ddd;
      color: #333;
      margin-right: auto;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #textInput {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e9ecef;
      border-radius: 12px;
      margin-top: 10px;
      outline: none;
      font-size: 1rem;
    }

    #languageSelect {
      width: 100%;
      padding: 10px 15px;
      border-radius: 12px;
      margin-top: 10px;
      border: 2px solid #e9ecef;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #5a6de0, #6a3fa1);
    }

    #canvas {
      display: none;
    }

    .thinking {
      color: #667eea;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #667eea;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
        opacity: 0.5;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <i class="fas fa-video"></i> Live Video Assistant
    </div>

    <div class="p-4">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>

      <div id="chatBox"></div>

      <input type="text" id="textInput" placeholder="🔍 Type your question & hit Enter">
      <select id="languageSelect">
        <option value="en" selected>🇬🇧 English</option>
        <option value="hi">🇮🇳 Hindi</option>
        <option value="ta">🇮🇳 Tamil</option>
      </select>

      <div class="button-group">
        <button onclick="captureFrame()"><i class="fas fa-camera"></i> Capture & Analyze</button>
        <button onclick="startVoiceInput()"><i class="fas fa-microphone"></i> Voice Input</button>
        <button onclick="window.location.href='chat.html'" 
        style="float:right; background:#dc3545; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer;">
  Logout
</button>
<div style="clear:both;"></div>

      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const textInput = document.getElementById("textInput");
    const chatBox = document.getElementById("chatBox");
    let recognition = null;
    let isListening = false;

    // Start camera
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => video.srcObject = stream)
      .catch(() => appendMessage("Camera access denied.", "bot-message"));

    // Append chat messages
    function appendMessage(message, className) {
      const div = document.createElement("div");
      div.classList.add("message", className);
      div.innerHTML = message;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Thinking indicator
    function showThinking() {
      const div = document.createElement("div");
      div.classList.add("message", "bot-message");
      div.innerHTML = `
        <div class="thinking">
          <i class="fas fa-brain"></i> Thinking
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>`;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div; // return element to replace later
    }

    // Capture frame and send to backend
    function captureFrame(textInputValue) {
      const text = textInputValue || textInput.value.trim();
      if (!text) return;
      appendMessage(`<i class='fas fa-user'></i> ${text}`, "user-message");

      const ctx = canvas.getContext("2d");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = canvas.toDataURL("image/jpeg");

      const loader = showThinking();
      sendRequest(imageData, text, loader);
      textInput.value = "";
    }

    // Send request to backend
    function sendRequest(image, text, loader) {
      const language = document.getElementById("languageSelect").value;

      fetch("/process_image_and_text", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include", // <-- IMPORTANT: keeps session cookie
        body: JSON.stringify({ image, text, language })
      })

        .then(res => res.json())
        .then(data => {
          const answer = data.response || data.error || "No response.";
          loader.innerHTML = `<i class='fas fa-robot' style='color:#667eea;'></i> ${answer}`;
          speakResponse(answer, language);
        })
        .catch(() => {
          loader.innerHTML = `<i class='fas fa-exclamation-triangle' style='color:red;'></i> Error processing request.`;
        });
    }

    // Voice Input (fixed)
    function startVoiceInput() {
      if (isListening) return; // prevent overlapping
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        appendMessage("Voice recognition not supported in this browser.", "bot-message");
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-IN';
      recognition.continuous = false;
      recognition.interimResults = false;

      isListening = true;
      appendMessage(`<i class='fas fa-microphone'></i> Listening...`, "bot-message");

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        captureFrame(transcript);
      };

      recognition.onerror = (event) => {
        appendMessage(`Voice error: ${event.error}`, "bot-message");
        isListening = false;
      };

      recognition.onend = () => {
        isListening = false;
      };

      recognition.start();
    }

    // Speak output
    function speakResponse(text, language) {
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const langMap = { en: 'en-US', hi: 'hi-IN', kn: 'kn-IN', ta: 'ta-IN', ml: 'ml-IN', te: 'te-IN' };
      utterance.lang = langMap[language] || 'en-US';
      utterance.rate = 1;
      window.speechSynthesis.speak(utterance);
    }

    // Enter to send
    textInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        captureFrame();
      }
    });

    // When user refreshes or closes, clear server session automatically
    window.addEventListener("beforeunload", () => {
      fetch("/reset_session", { method: "POST", credentials: "include" });
    });

  </script>
</body>

</html>
