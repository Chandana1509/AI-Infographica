<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Offline Chatbot (Ollama)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>

  <style>
    /* ==== Global Styles (Copied from Inphotograpic AI) ==== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --dark-bg: #0f0c29;
      --dark-secondary: #1a1539;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.18);
      --text-primary: #ffffff;
      --text-secondary: #b8b8d1;
      --shadow-glow: 0 8px 32px 0 rgba(102, 126, 234, 0.37);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark-bg);
      background-image:
        radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.2) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(118, 75, 162, 0.2) 0px, transparent 50%);
      min-height: 100vh;
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .chat-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
    }

    .chat-header {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px 30px;
      box-shadow: var(--shadow-glow);
      animation: fadeInDown 0.6s ease-out;
    }

    .chat-header h1 {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2rem;
      font-weight: 700;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .chat-header i {
      color: #4facfe;
      animation: pulse 2s infinite;
    }

    .chat-container {
      flex: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 30px;
      overflow-y: auto !important;
      overflow-x: hidden;
      box-shadow: var(--shadow-glow);
      animation: fadeIn 0.6s ease-out 0.2s both;
    }

    .chat-box {
      height: 100%;
      overflow-y: auto;
      padding-right: 10px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar {
      width: 8px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: var(--accent-gradient);
      border-radius: 10px;
    }

    .message-wrapper {
      margin-bottom: 20px;
      animation: fadeInUp 0.4s ease-out;
    }

    .user-msg,
    .bot-msg {
      padding: 15px 20px;
      border-radius: 15px;
      margin: 10px 0;
      max-width: 80%;
      word-wrap: break-word;
      line-height: 1.6;
    }

    .user-msg {
      background: var(--primary-gradient);
      margin-left: auto;
      text-align: right;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .bot-msg {
      background: var(--dark-secondary);
      border: 1px solid var(--glass-border);
      margin-right: auto;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .chat-footer {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 25px;
      box-shadow: var(--shadow-glow);
      animation: fadeInUp 0.6s ease-out 0.4s both;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .select-lang,
    .user-input {
      background: var(--dark-secondary);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .send-btn {
      background: var(--primary-gradient);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .mic-btn,
    .controls a button {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
    }

    .controls a {
      text-decoration: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }

      .user-msg,
      .bot-msg {
        max-width: 95%;
      }
    }

    /* FIX: Prevent message clipping */
    .chat-container {
      overflow: visible !important;
    }

    .bot-msg,
    .user-msg {
      white-space: pre-wrap !important;
      overflow: visible !important;
    }

    .message-wrapper {
      overflow: visible !important;
    }
  </style>

  <script>
    mermaid.initialize({ startOnLoad: true, theme: "dark" });
  </script>
</head>

<body>
  <div class="chat-wrapper">
    <header class="chat-header">
      <h1><i class="fas fa-robot"></i> Ollama AI</h1>
    </header>

    <main class="chat-container">
      <div id="chat-box" class="chat-box"></div>
    </main>

    <footer class="chat-footer">
      <div class="controls">
        <select id="language-select" class="select-lang">
          <option value="english" selected>🌐 English</option>
          <option value="kannada">🌐 Kannada</option>
        </select>

        <input type="text" id="user-input" placeholder="Type your message..." class="user-input">

        <button onclick="sendMessage()" class="btn send-btn">
          <i class="fas fa-paper-plane"></i> Send
        </button>

        <button id="mic-btn" onclick="window.location.href='/voice'" class="btn mic-btn">
          <i class="fas fa-microphone"></i> Speak
        </button>

        <a href="/liveVideo">
          <button class="btn"><i class="fas fa-video"></i> Live Video</button>
        </a>

        <a href="/index">
          <button class="btn"><i class="fas fa-comments"></i> Online Chat</button>
        </a>
      </div>
    </footer>
  </div>

  <script>
    async function sendMessage() {
      const input = document.getElementById("user-input");
      const message = input.value.trim();
      if (!message) return;

      const chatBox = document.getElementById("chat-box");

      // User message
      const userMsg = document.createElement("div");
      userMsg.className = "message-wrapper";
      userMsg.innerHTML = `<div class='user-msg'><i class='fas fa-user'></i> ${message}</div>`;
      chatBox.appendChild(userMsg);
      input.value = "";

      // Thinking indicator
      const thinking = document.createElement("div");
      thinking.className = "bot-msg";
      thinking.innerHTML = `<i class='fas fa-spinner fa-spin'></i> Thinking...`;
      chatBox.appendChild(thinking);
      chatBox.scrollTop = chatBox.scrollHeight;

      const lang = document.getElementById("language-select").value;

      try {
        // ✅ Correct backend endpoint
        const res = await fetch("/ollama_api", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, language: lang })
        });

        const data = await res.json();

        // Remove spinner
        thinking.remove();

        // ✅ Show bot reply
        const botMsg = document.createElement("div");
        botMsg.className = "message-wrapper";
        botMsg.innerHTML = `
        <div class='bot-msg'>
          <b><i class="fas fa-robot"></i> AI:</b><br>
          ${marked.parse(data.reply || "⚠️ No response")}
        </div>`;
        chatBox.appendChild(botMsg);
        chatBox.scrollTop = chatBox.scrollHeight;
      } catch (error) {
        thinking.remove();
        const errMsg = document.createElement("div");
        errMsg.className = "bot-msg";
        errMsg.innerHTML = `<b>Error:</b> Could not reach the backend. Check Flask console.`;
        chatBox.appendChild(errMsg);
      }
    }
    // Clear local chat memory automatically when page reloads or closes
    window.addEventListener("beforeunload", function () {
      // Clear localStorage if used
      localStorage.removeItem("chatHistory");
      localStorage.removeItem("conversationId");

      // Optional: clear any in-memory variables
      if (window.messages) {
        window.messages = [];
      }
    });

  </script>

</body>

</html>
